<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>購入依頼書シャトルガード</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="navbar hide-on-print">
        <div class="navbar-content">
            <div class="logo-area">
                <img src="tsh.png" alt="TSH Logo" class="tsh-logo-nav">
                <span class="system-title">物品管理</span>
            </div>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('form')">購入依頼書入力</button>
                <button class="tab-btn" onclick="switchTab('history')">発注履歴・納品管理</button>
            </div>
        </div>
    </div>

    <div id="tab-form" class="tab-content active hide-on-print">
        <div class="form-wrapper">
            <div class="form-header-area">
                <img src="tsh.png" alt="TSH Logo" class="tsh-logo-large">
                <h1 class="main-title">購入依頼書シャトルガード</h1>
            </div>
            
            <form id="purchaseForm" onsubmit="submitData(event)">
                <div class="form-grid">
                    <div class="form-group col-full">
                        <label>購入依頼日 <span class="required">*</span></label>
                        <input type="date" id="reqDate" required>
                    </div>

                    <div class="form-group col-half">
                        <label>メーカー <span class="required">*</span></label>
                        <input type="text" id="maker" placeholder="例：マキタ" required>
                    </div>

                    <div class="form-group col-half">
                        <label>型式</label>
                        <input type="text" id="model" placeholder="例：TD171D">
                    </div>

                    <div class="form-group col-full">
                        <label>購入先 <span class="required">*</span></label>
                        <select id="vendorSelect" required onchange="handleVendorChange()">
                            <option value="" disabled selected>選択してください</option>
                            <option value="モノタロウ">モノタロウ</option>
                            <option value="ミスミ">ミスミ</option>
                            <option value="その他">その他</option>
                        </select>
                        <input type="text" id="otherVendorInput" class="hidden-input" placeholder="購入先を入力してください">
                    </div>

                    <div class="form-group col-half">
                        <label>発注コード</label>
                        <input type="text" id="code" placeholder="例：A-12345">
                    </div>

                   <div class="form-group col-half">
    <label>担当者 <span class="required">*</span></label>
    <select id="pic" required>
        <option value="" disabled selected>選択してください</option>
        <option value="秋山">秋山</option>
        <option value="白石">白石</option>
        <option value="李">李</option>
        <option value="青木">青木)</option>
    </select>
</div>

                    <div class="form-group col-full item-name-group">
                        <label>品名 <span class="required">*</span></label>
                        <input type="text" id="itemName" placeholder="例：充電式インパクトドライバ" required>
                    </div>

                    <div class="form-row col-full">
                        <div class="form-group qty-group">
                            <label>数量 <span class="required">*</span></label>
                            <input type="number" id="qty" min="1" required>
                        </div>
                        <div class="form-group unit-group">
                            <label>単位 <span class="required">*</span></label>
                            <select id="unit" required>
                                <option value="個">個</option>
                                <option value="枚">枚</option>
                                <option value="本">本</option>
                                <option value="缶">缶</option>
                                <option value="箱">箱</option>
                                <option value="式">式</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" id="btnSubmit" class="btn-primary">
                        <span class="icon">📩</span> 依頼データを送信
                    </button>
                    <div id="formStatus"></div>
                </div>
            </form>
        </div>
    </div>

    <div id="tab-history" class="tab-content hide-on-print">
        <div class="card card-large">
            <div class="history-header">
                <h2>発注履歴</h2>
                <div class="header-actions">
                    <button class="btn-secondary" onclick="loadData()">🔄 更新</button>
                    <button class="btn-print" onclick="printMonthly()">🖨️ 月次レポート印刷 (A4)</button>
                </div>
            </div>

            <div class="dashboard-bar">
                <div class="dash-stats">
                    <div class="dash-item">総発注: <strong id="dash-total">0</strong></div>
                    <div class="dash-item text-danger">未納品: <strong id="dash-pending">0</strong></div>
                    <div class="dash-item text-success">納品済: <strong id="dash-completed">0</strong></div>
                </div>
                <div class="search-group">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="品名、メーカー、担当者で検索..." onkeyup="filterData()">
                </div>
            </div>
            
            <div class="table-container">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th class="col-id">ID</th>
                            <th>日付</th>
                            <th>メーカー</th>
                            <th>型式</th>
                            <th>品名</th>
                            <th>数量</th>
                            <th>担当者</th>
                            <th>ステータス</th>
                            <th class="col-action">アクション</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="9" style="text-align: center; padding: 40px;">データを読み込んでいます...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="print-area">
        <div class="print-container">
            <div class="print-header">
                <img src="tsh.png" alt="TSH Logo" class="tsh-logo-print">
                <h1>購入依頼書シャトルガード レポート</h1>
                <p class="print-meta">発行日: <span id="print-date"></span></p>
            </div>
            <table class="print-table">
                <thead>
                    <tr>
                        <th class="p-col-date">日付</th>
                        <th class="p-col-maker">メーカー</th>
                        <th>品名・型式</th>
                        <th class="p-col-vendor">購入先</th>
                        <th class="p-col-qty">数量</th>
                        <th class="p-col-pic">担当者</th>
                        <th class="p-col-status">ステータス</th>
                    </tr>
                </thead>
                <tbody id="print-table-body">
                </tbody>
            </table>
            <div class="print-footer">
                <p class="notes">※本レポートはシステムより自動生成されました。</p>
                <div class="signature-area">
                    <div class="sig-box">
                        <p>承認者</p>
                        <div class="stamp-circle">印</div>
                    </div>
                    <div class="sig-box">
                        <p>担当者</p>
                        <div class="stamp-circle">印</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
